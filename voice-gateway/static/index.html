<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>voice-1c-mvp — голосовой чат</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --accent:#4f8cff; --accent2:#e06c3a;
          --txt:#e6e8ee; --muted:#9aa3b2; --ok:#3fb950; --err:#ff6b6b; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:"Segoe UI",system-ui,sans-serif; background:var(--bg);
         color:var(--txt); height:100vh; display:flex; flex-direction:column; }
  header { padding:14px 20px; background:var(--panel); border-bottom:1px solid #232733;
           display:flex; align-items:center; gap:12px; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header .sub { color:var(--muted); font-size:12px; }
  #status { margin-left:auto; font-size:12px; color:var(--muted); }
  #status.dot::before { content:""; display:inline-block; width:8px; height:8px;
         border-radius:50%; background:var(--muted); margin-right:6px; vertical-align:middle; }
  #chat { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; }
  .msg { max-width:75%; padding:10px 14px; border-radius:14px; line-height:1.4; font-size:15px;
         white-space:pre-wrap; word-wrap:break-word; }
  .msg .meta { display:block; font-size:11px; color:var(--muted); margin-top:6px; }
  .me { align-self:flex-end; background:var(--accent); color:#fff; border-bottom-right-radius:4px; }
  .bot { align-self:flex-start; background:var(--panel); border:1px solid #232733; border-bottom-left-radius:4px; }
  .bot.error { border-color:var(--err); color:var(--err); }
  .toolbar { background:var(--panel); border-top:1px solid #232733; padding:8px 20px;
             display:flex; gap:16px; align-items:center; font-size:12px; color:var(--muted);
             flex-wrap:wrap; }
  .toolbar label { display:flex; align-items:center; gap:6px; cursor:pointer; }
  .toolbar select { background:#0f1115; color:var(--txt); border:1px solid #2a2f3c;
                    border-radius:6px; padding:3px 6px; font-size:12px; }
  #vu { flex:1; min-width:120px; height:6px; background:#0f1115; border-radius:4px; overflow:hidden; border:1px solid #2a2f3c; }
  #vubar { height:100%; width:0%; background:linear-gradient(90deg,var(--ok),var(--accent2)); transition:width .06s linear; }
  .toolbar input[type=range] { width:120px; vertical-align:middle; accent-color:var(--accent); }
  #readout { font-variant-numeric:tabular-nums; min-width:180px; color:var(--muted); }
  footer { background:var(--panel); border-top:1px solid #232733; padding:14px 20px;
           display:flex; gap:10px; align-items:center; }
  #mic { width:56px; height:56px; border-radius:50%; border:none; cursor:pointer;
         background:var(--accent); color:#fff; font-size:22px; flex:0 0 auto;
         display:flex; align-items:center; justify-content:center; transition:.15s; }
  #mic:hover { filter:brightness(1.1); }
  #mic.rec { background:var(--accent2); animation:pulse 1.2s infinite; }
  #mic.dialog { background:var(--ok); }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(224,108,58,.5)} 70%{box-shadow:0 0 0 16px rgba(224,108,58,0)} 100%{box-shadow:0 0 0 0 rgba(224,108,58,0)} }
  #txt { flex:1; background:#0f1115; border:1px solid #2a2f3c; color:var(--txt);
         border-radius:12px; padding:12px 14px; font-size:15px; outline:none; }
  #txt:focus { border-color:var(--accent); }
  #send { background:var(--accent); color:#fff; border:none; border-radius:12px;
          padding:12px 18px; font-size:15px; cursor:pointer; }
  #send:hover { filter:brightness(1.1); }
  .hint { font-size:12px; color:var(--muted); text-align:center; padding:6px 20px 10px; }
  audio { display:none; }
</style>
</head>
<body>
  <header>
    <h1>🎙 voice-1c-mvp</h1>
    <span class="sub">голос → STT → LM Studio → 1C → TTS</span>
    <span id="status" class="dot">готов</span>
  </header>

  <div id="chat"></div>

  <div class="toolbar">
    <label><input type="checkbox" id="autoMode"> Авто-диалог (VAD)</label>
    <label>порог: <input type="range" id="thresh" min="0.010" max="0.150" step="0.005" value="0.040"></label>
    <label>пауза до ответа: <input type="range" id="pause" min="300" max="2000" step="100" value="800"> мс</label>
    <span id="readout">—</span>
    <div id="vu"><div id="vubar"></div></div>
  </div>
  <div class="hint" id="hint">Нажми кружок и говори. В «Авто-диалоге» система сама поймёт конец фразы. Если не останавливается из-за шума — подними «порог» так, чтобы шум был ниже значения «старт» (видно по цифрам).</div>

  <footer>
    <button id="mic" title="Говорить">🎙</button>
    <input id="txt" type="text" placeholder="или напиши вопрос…" autocomplete="off">
    <button id="send">Отправить</button>
  </footer>
  <audio id="player" autoplay></audio>

<script>
const mic = document.getElementById('mic');
const txt = document.getElementById('txt');
const sendBtn = document.getElementById('send');
const chat = document.getElementById('chat');
const statusEl = document.getElementById('status');
const player = document.getElementById('player');
const autoModeEl = document.getElementById('autoMode');
const threshEl = document.getElementById('thresh');
const pauseEl = document.getElementById('pause');
const readout = document.getElementById('readout');
const vubar = document.getElementById('vubar');
const hintEl = document.getElementById('hint');

// ---- state ----
// push mode: recording bool. dialog mode: dialogState ∈ idle|arming|listening|talking|processing|answering
let recording = false;            // push-to-talk
let dialogActive = false;         // dialog session running
let dstate = 'idle';              // dialog sub-state
let mediaRecorder = null, chunks = [], streamRef = null;
// audio analysis
let audioCtx = null, analyser = null, sourceNode = null, rmsBuf = null;
let tickTimer = null;
let noiseFloor = 0.012;
let smoothed = 0;
let aboveSince = 0, speechStart = 0, lastVoice = 0, calibStart = 0, calibSum = 0, calibN = 0;

const SENS = {
  'низкая':  { margin: 0.050, silenceMs: 1100, startMs: 300 },
  'средняя': { margin: 0.032, silenceMs: 850,  startMs: 220 },
  'высокая': { margin: 0.020, silenceMs: 650,  startMs: 160 },
};
const MIN_SPEECH_MS = 350;
const MAX_PHRASE_MS = 15000;
const START_MS = 220;

function offset() { return parseFloat(threshEl.value); }
function pauseMs() { return parseInt(pauseEl.value, 10); }
// two-threshold VAD: speechThresh starts a phrase; silenceThresh (lower) ends it
function speechThresh() { return Math.max(noiseFloor + offset(), 0.015); }
function silenceThresh() { return Math.max(noiseFloor + offset() * 0.45, 0.012); }

function setStatus(s, color) { statusEl.textContent = s; statusEl.style.color = color || ''; }
function dec(s){ try { return decodeURIComponent(s || ''); } catch { return s || ''; } }
function addMsg(who, text, meta) {
  const el = document.createElement('div');
  el.className = 'msg ' + (who === 'me' ? 'me' : 'bot');
  el.innerHTML = escapeHtml(text) + (meta ? `<span class="meta">${escapeHtml(meta)}</span>` : '');
  chat.appendChild(el); chat.scrollTop = chat.scrollHeight; return el;
}
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function ensureMic() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia)
    throw new Error('Микрофон недоступен (нужен HTTPS или localhost)');
  return await navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation:true, noiseSuppression:true, autoGainControl:true }
  });
}

function pickMime() {
  return MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
       : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm'
       : MediaRecorder.isTypeSupported('audio/ogg;codecs=opus') ? 'audio/ogg;codecs=opus' : '';
}
function extFor(mime) {
  const t = (mime || 'audio/webm').split(';')[0];
  return t.includes('webm') ? 'webm' : (t.includes('ogg') ? 'ogg' : 'wav');
}
function makeRecorder(stream) {
  const mime = pickMime();
  const r = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
  return r;
}

// ---------- audio analysis (VAD) ----------
function setupAnalyser(stream) {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  sourceNode = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  sourceNode.connect(analyser);   // NOT to destination → no echo
  rmsBuf = new Float32Array(analyser.fftSize);
}
function computeRMS() {
  analyser.getFloatTimeDomainData(rmsBuf);
  let s = 0; for (let i=0;i<rmsBuf.length;i++){ const v=rmsBuf[i]; s+=v*v; }
  return Math.sqrt(s/rmsBuf.length);
}

// ---------- dialog mode ----------
async function startDialog() {
  try {
    const stream = await ensureMic();
    streamRef = stream;
    setupAnalyser(stream);
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    dialogActive = true;
    mic.classList.add('dialog');
    calibrateAndListen();
    tickTimer = setInterval(tick, 50);
    hintEl.textContent = 'Диалог: говори свободно. Подожди секунду — система поймёт, что фраза окончена. Кружок — остановить.';
  } catch (e) {
    addMsg('bot', 'Ошибка микрофона: ' + e.message, '').classList.add('error');
    setStatus('ошибка', 'var(--err)');
    stopDialog();
  }
}

function calibrateAndListen() {
  dstate = 'listening';
  aboveSince = 0; speechStart = 0; smoothed = 0;
  calibStart = performance.now(); calibSum = 0; calibN = 0;
  noiseFloor = 0.012;
  setStatus('слушаю…', 'var(--ok)');
  mic.textContent = '⛔'; mic.title = 'Остановить диалог';
}

function tick() {
  if (!dialogActive) return;
  const r = computeRMS();
  // smoothing: fast attack on rising signal, slower release → stable but responsive
  smoothed = smoothed * (r > smoothed ? 0.5 : 0.8) + r * (r > smoothed ? 0.5 : 0.2);
  const now = performance.now();
  const sp = speechThresh(), si = silenceThresh();

  // ambient calibration (first 800ms), then slow-follow quiet background while silent
  if (dstate === 'listening') {
    if (now - calibStart < 800) {
      calibSum += r; calibN++; noiseFloor = calibSum / calibN;
    } else if (smoothed < sp) {
      noiseFloor = noiseFloor * 0.98 + smoothed * 0.02;
    }
  }

  const scale = Math.max(sp * 2.2, 0.05);
  vubar.style.width = Math.min(100, (smoothed / scale) * 100) + '%';
  readout.textContent = `RMS ${smoothed.toFixed(3)} · старт ${sp.toFixed(3)} · стоп ${si.toFixed(3)} · шум ${noiseFloor.toFixed(3)}`;

  if (dstate === 'listening') {
    if (smoothed > sp) {
      if (!aboveSince) aboveSince = now;
      if (now - aboveSince >= START_MS) {
        // confirmed speech start → record
        try {
          chunks = [];
          mediaRecorder = makeRecorder(streamRef);
          mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };
          mediaRecorder.onstop = onPhraseEnd;
          mediaRecorder.start();
          dstate = 'talking';
          speechStart = now; lastVoice = now;
          mic.classList.remove('dialog'); mic.classList.add('rec');
          setStatus('говорите…', '#e06c3a');
        } catch (e) { console.warn(e); calibrateAndListen(); }
      }
    } else { aboveSince = 0; }
  } else if (dstate === 'talking') {
    // only signal above the (low) silence threshold keeps the phrase alive;
    // background noise below it lets the phrase end
    if (smoothed > si) lastVoice = now;
    if (now - lastVoice >= pauseMs() || now - speechStart >= MAX_PHRASE_MS) {
      dstate = 'processing';
      setStatus('думаю…', 'var(--accent)');
      try { if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop(); } catch {}
    }
  }
}

function onPhraseEnd() {
  mic.classList.remove('rec');
  const dur = performance.now() - speechStart;
  const mime = (mediaRecorder && mediaRecorder.mimeType) || 'audio/webm';
  const blob = new Blob(chunks, { type: mime.split(';')[0] });
  chunks = [];
  if (dur < MIN_SPEECH_MS) {
    // too short → noise, skip and keep listening
    if (dialogActive) calibrateAndListen();
    return;
  }
  sendAudio(blob, 'audio.' + extFor(mime)).then(() => {
    // callPipeline played the answer and resumed listening if dialog still active
  }).catch(()=>{});
}

function stopDialog() {
  dialogActive = false;
  if (tickTimer) { clearInterval(tickTimer); tickTimer = null; }
  try { if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop(); } catch {}
  if (streamRef) streamRef.getTracks().forEach(t => t.stop());
  streamRef = null;
  if (sourceNode) try { sourceNode.disconnect(); } catch {}
  if (audioCtx) try { audioCtx.close(); } catch {}
  audioCtx = null; analyser = null; sourceNode = null;
  mic.classList.remove('dialog','rec');
  mic.textContent = '🎙'; mic.title = 'Говорить';
  vubar.style.width = '0%';
  dstate = 'idle';
  setStatus('готов');
  hintEl.textContent = 'Нажми кружок и говори, ещё раз — для ответа. Включи «Авто-диалог» — и система сама поймёт конец фразы и продолжит диалог.';
}

// ---------- push-to-talk mode ----------
async function pushToggle() {
  if (!recording) {
    try {
      const stream = await ensureMic();
      streamRef = stream;
      chunks = [];
      mediaRecorder = makeRecorder(stream);
      mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };
      const mime = mediaRecorder.mimeType || 'audio/webm';
      mediaRecorder.onstop = () => {
        const blob = new Blob(chunks, { type: mime.split(';')[0] });
        chunks = [];
        sendAudio(blob, 'audio.' + extFor(mime));
        if (streamRef) streamRef.getTracks().forEach(t => t.stop());
      };
      mediaRecorder.start();
      recording = true; mic.classList.add('rec'); mic.textContent='⏹'; mic.title='Остановить';
      setStatus('запись…', '#e06c3a');
    } catch (e) {
      addMsg('bot','Ошибка микрофона: ' + e.message,'').classList.add('error');
      setStatus('ошибка','var(--err)');
    }
  } else {
    try { if (mediaRecorder && mediaRecorder.state==='recording') mediaRecorder.stop(); } catch {}
    recording = false; mic.classList.remove('rec'); mic.textContent='🎙'; mic.title='Говорить';
    setStatus('обработка…','var(--accent)');
  }
}

mic.addEventListener('click', () => {
  if (autoModeEl.checked) { dialogActive ? stopDialog() : startDialog(); }
  else { pushToggle(); }
});

async function sendAudio(blob, filename) {
  const fd = new FormData(); fd.append('file', blob, filename);
  await callPipeline('/ask', fd);
}
async function sendText() {
  const text = txt.value.trim(); if (!text) return;
  txt.value=''; addMsg('me', text); setStatus('обработка…','var(--accent)');
  await callPipeline('/ask-text', JSON.stringify({ text }), true);
}

async function callPipeline(url, body, isJson) {
  try {
    const opt = { method:'POST', body };
    if (isJson) opt.headers = { 'Content-Type':'application/json' };
    const r = await fetch(url, opt);
    const q = dec(r.headers.get('X-Question'));
    const intent = dec(r.headers.get('X-Intent'));
    const answer = dec(r.headers.get('X-Answer'));
    if (!r.ok) {
      const detail = await r.text();
      addMsg('bot','Ошибка '+r.status+': '+detail,'').classList.add('error');
      setStatus('ошибка','var(--err)');
      if (dialogActive) calibrateAndListen();
      return;
    }
    if (url==='/ask') addMsg('me', q || '(пусто)');
    let meta=''; try { const j=JSON.parse(intent); if (j&&j.action) meta='intent: '+JSON.stringify(j); } catch {}
    addMsg('bot', answer || '(пустой ответ)', meta);
    const ab = await r.arrayBuffer();
    await playAnswer(ab);
  } catch (e) {
    addMsg('bot','Сеть/сервер: '+e.message,'').classList.add('error');
    setStatus('ошибка','var(--err)');
  } finally {
    // resume dialog if active, otherwise idle
    if (dialogActive) calibrateAndListen();
    else if (!recording) setStatus('готов');
  }
}

async function playAnswer(arrayBuffer) {
  // pause listening while our own answer plays (so the mic doesn't catch it)
  const wasDialog = dialogActive;
  if (wasDialog) { dstate = 'answering'; setStatus('отвечаю…','var(--ok)'); }
  return new Promise((resolve) => {
    player.src = URL.createObjectURL(new Blob([arrayBuffer], { type:'audio/wav' }));
    player.onended = () => resolve();
    player.onerror = () => resolve();
    player.play().catch(()=>resolve());
  });
}

sendBtn.addEventListener('click', sendText);
txt.addEventListener('keydown', e => { if (e.key==='Enter') sendText(); });
autoModeEl.addEventListener('change', () => {
  if (!autoModeEl.checked && dialogActive) stopDialog();
});

fetch('/health').then(r=>r.json()).then(h=>{
  if (!h.stt || !h.tts) setStatus('сервисы не готовы','var(--err)'); else setStatus('готов');
}).catch(()=> setStatus('шлюз недоступен','var(--err)'));
</script>
</body>
</html>
