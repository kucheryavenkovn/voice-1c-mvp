<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>voice-1c-mvp — голосовой чат</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --accent:#4f8cff; --accent2:#e06c3a;
          --txt:#e6e8ee; --muted:#9aa3b2; --ok:#3fb950; --err:#ff6b6b; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:"Segoe UI",system-ui,sans-serif; background:var(--bg);
         color:var(--txt); height:100vh; display:flex; flex-direction:column; }
  header { padding:14px 20px; background:var(--panel); border-bottom:1px solid #232733;
           display:flex; align-items:center; gap:12px; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header .sub { color:var(--muted); font-size:12px; }
  #status { margin-left:auto; font-size:12px; color:var(--muted); }
  #status.dot::before { content:""; display:inline-block; width:8px; height:8px;
         border-radius:50%; background:var(--muted); margin-right:6px; vertical-align:middle; }
  #chat { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; }
  .msg { max-width:75%; padding:10px 14px; border-radius:14px; line-height:1.4; font-size:15px;
         white-space:pre-wrap; word-wrap:break-word; }
  .msg .meta { display:block; font-size:11px; color:var(--muted); margin-top:6px; }
  .me { align-self:flex-end; background:var(--accent); color:#fff; border-bottom-right-radius:4px; }
  .bot { align-self:flex-start; background:var(--panel); border:1px solid #232733; border-bottom-left-radius:4px; }
  .bot.error { border-color:var(--err); color:var(--err); }
  footer { background:var(--panel); border-top:1px solid #232733; padding:14px 20px;
           display:flex; gap:10px; align-items:center; }
  #mic { width:56px; height:56px; border-radius:50%; border:none; cursor:pointer;
         background:var(--accent); color:#fff; font-size:22px; flex:0 0 auto;
         display:flex; align-items:center; justify-content:center; transition:.15s; }
  #mic:hover { filter:brightness(1.1); }
  #mic.rec { background:var(--accent2); animation:pulse 1.2s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(224,108,58,.5)} 70%{box-shadow:0 0 0 16px rgba(224,108,58,0)} 100%{box-shadow:0 0 0 0 rgba(224,108,58,0)} }
  #txt { flex:1; background:#0f1115; border:1px solid #2a2f3c; color:var(--txt);
         border-radius:12px; padding:12px 14px; font-size:15px; outline:none; }
  #txt:focus { border-color:var(--accent); }
  #send { background:var(--accent); color:#fff; border:none; border-radius:12px;
          padding:12px 18px; font-size:15px; cursor:pointer; }
  #send:hover { filter:brightness(1.1); }
  .hint { font-size:12px; color:var(--muted); text-align:center; padding:0 20px 10px; }
  audio { display:none; }
</style>
</head>
<body>
  <header>
    <h1>🎙 voice-1c-mvp</h1>
    <span class="sub">голос → STT → LM Studio → 1C → TTS</span>
    <span id="status" class="dot">готов</span>
  </header>

  <div id="chat"></div>

  <div class="hint">Нажми кружок и говори (например: «какой остаток по молоку?»), ещё раз — чтобы получить ответ. Можно писать текстом.</div>

  <footer>
    <button id="mic" title="Говорить">🎙</button>
    <input id="txt" type="text" placeholder="или напиши вопрос…" autocomplete="off">
    <button id="send">Отправить</button>
  </footer>
  <audio id="player" autoplay></audio>

<script>
const mic = document.getElementById('mic');
const txt = document.getElementById('txt');
const sendBtn = document.getElementById('send');
const chat = document.getElementById('chat');
const statusEl = document.getElementById('status');
const player = document.getElementById('player');

let mediaRecorder = null;
let chunks = [];
let recording = false;
let streamRef = null;

function setStatus(s, color) {
  statusEl.textContent = s;
  statusEl.style.color = color || '';
}
function dec(s){ try { return decodeURIComponent(s || ''); } catch { return s || ''; } }

function addMsg(who, text, meta) {
  const el = document.createElement('div');
  el.className = 'msg ' + (who === 'me' ? 'me' : 'bot');
  el.innerHTML = escapeHtml(text) + (meta ? `<span class="meta">${escapeHtml(meta)}</span>` : '');
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function ensureMic() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    throw new Error('Микрофон недоступен (нужен HTTPS или localhost)');
  }
  return await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation:true, noiseSuppression:true } });
}

mic.addEventListener('click', async () => {
  if (!recording) {
    try {
      const stream = await ensureMic();
      streamRef = stream;
      chunks = [];
      const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
                 : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm'
                 : MediaRecorder.isTypeSupported('audio/ogg;codecs=opus') ? 'audio/ogg;codecs=opus' : '';
      mediaRecorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };
      mediaRecorder.onstop = () => {
        const type = (mediaRecorder.mimeType || 'audio/webm').split(';')[0];
        const blob = new Blob(chunks, { type });
        const ext = type.includes('webm') ? 'webm' : (type.includes('ogg') ? 'ogg' : 'wav');
        sendAudio(blob, 'audio.' + ext);
        streamRef.getTracks().forEach(t => t.stop());
      };
      mediaRecorder.start();
      recording = true;
      mic.classList.add('rec');
      mic.textContent = '⏹';
      mic.title = 'Остановить';
      setStatus('запись…', '#e06c3a');
    } catch (e) {
      addMsg('bot', 'Ошибка микрофона: ' + e.message, '').classList.add('error');
      setStatus('ошибка', 'var(--err)');
    }
  } else {
    if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
    recording = false;
    mic.classList.remove('rec');
    mic.textContent = '🎙';
    mic.title = 'Говорить';
    setStatus('обработка…', 'var(--accent)');
  }
});

async function sendAudio(blob, filename) {
  const fd = new FormData();
  fd.append('file', blob, filename);
  await callPipeline('/ask', fd);
}
async function sendText() {
  const text = txt.value.trim();
  if (!text) return;
  txt.value = '';
  addMsg('me', text);
  setStatus('обработка…', 'var(--accent)');
  await callPipeline('/ask-text', JSON.stringify({ text }), true);
}

async function callPipeline(url, body, isJson) {
  const meMsg = url === '/ask' ? null : null; // text already added
  try {
    const opt = { method:'POST', body };
    if (isJson) opt.headers = { 'Content-Type':'application/json' };
    const r = await fetch(url, opt);
    const q = dec(r.headers.get('X-Question'));
    const intent = dec(r.headers.get('X-Intent'));
    const answer = dec(r.headers.get('X-Answer'));
    if (!r.ok) {
      const detail = await r.text();
      addMsg('bot', 'Ошибка ' + r.status + ': ' + detail, '').classList.add('error');
      setStatus('ошибка', 'var(--err)');
      return;
    }
    if (url === '/ask') addMsg('me', q || '(пусто)');
    let meta = '';
    try { const j = JSON.parse(intent); if (j && j.action) meta = 'intent: ' + JSON.stringify(j); } catch {}
    addMsg('bot', answer || '(пустой ответ)', meta);
    const ab = await r.arrayBuffer();
    player.src = URL.createObjectURL(new Blob([ab], { type:'audio/wav' }));
    player.play().catch(()=>{});
    setStatus('готов');
  } catch (e) {
    addMsg('bot', 'Сеть/сервер: ' + e.message, '').classList.add('error');
    setStatus('ошибка', 'var(--err)');
  }
}

sendBtn.addEventListener('click', sendText);
txt.addEventListener('keydown', e => { if (e.key === 'Enter') sendText(); });

fetch('/health').then(r=>r.json()).then(h=>{
  if (!h.stt || !h.tts) setStatus('сервисы не готовы', 'var(--err)');
  else setStatus('готов');
}).catch(()=> setStatus('шлюз недоступен', 'var(--err)'));
</script>
</body>
</html>
