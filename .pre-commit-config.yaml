repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: pytest-not-ui
        name: pytest (excl UI)
        entry: pytest -m "not ui"
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
